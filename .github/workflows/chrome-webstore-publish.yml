# Publishes a new version to the Chrome Web Store (upload + submit for review).
# Manual only — requires repository secrets (see extension/README.md → Publish from CI).

name: Publish Chrome Web Store

on:
  workflow_dispatch:

concurrency:
  group: chrome-webstore-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # Avoid accidental publishes from topic branches; run from main only.
    if: github.ref_name == 'main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # npm run publish:chrome → build:zip (embeds GitHub OAuth) + chrome-webstore-upload CLI
      - name: Build, zip, and publish
        env:
          CHROME_WEBSTORE_CLIENT_ID: ${{ secrets.CHROME_WEBSTORE_CLIENT_ID }}
          CHROME_WEBSTORE_CLIENT_SECRET: ${{ secrets.CHROME_WEBSTORE_CLIENT_SECRET }}
          CHROME_WEBSTORE_REFRESH_TOKEN: ${{ secrets.CHROME_WEBSTORE_REFRESH_TOKEN }}
          CHROME_WEBSTORE_EXTENSION_ID: ${{ secrets.CHROME_WEBSTORE_EXTENSION_ID }}
          GITHUB_OAUTH_CLIENT_ID: ${{ secrets.EXTENSION_PRODUCTION_GITHUB_OAUTH_CLIENT_ID }}
          GITHUB_OAUTH_CLIENT_SECRET: ${{ secrets.EXTENSION_PRODUCTION_GITHUB_OAUTH_CLIENT_SECRET }}
        run: npm run publish:chrome
